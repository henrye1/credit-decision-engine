pid /tmp/nginx.pid;
events {
  worker_connections 1024;
}
http {
  include mime.types;
  default_type application/octet-stream;
  server {
    listen 8000;
    root /usr/share/nginx/html;
    index index.html;
    location / {
      try_files $uri /index.html;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
      expires 1y;
      access_log off;
      add_header Cache-Control "public";
    }
  }
}
